<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle — school blue with orange ring -->
  <circle cx="256" cy="256" r="256" fill="#1b2a7d"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="#e8762a" stroke-width="24"/>

  <!-- Sharp angular stock trend line — decisive upward movement -->
  <polyline points="80,320 160,300 200,330 260,240 320,200 370,100"
    fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Arrow head — sharp, triangular -->
  <polygon points="370,100 340,130 355,135 370,100" fill="#ffffff"/>
  <polygon points="370,100 395,120 400,105 370,100" fill="#ffffff"/>

  <!-- YIS text -->
  <text x="180" y="410" font-family="Georgia, serif" font-size="80" font-weight="700" fill="#e8762a" text-anchor="middle">YIS</text>
</svg>
