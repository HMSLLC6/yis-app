<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Bear profile - facing left, stylized -->
  <g stroke="none" fill="currentColor">
    <!-- Ear back -->
    <path d="M76 10 C82 4, 90 4, 94 10 C96 16, 92 22, 86 24 C82 22, 78 18, 76 12Z"/>
    <!-- Ear front -->
    <path d="M40 8 C34 2, 26 2, 22 8 C20 14, 24 20, 30 22 C34 20, 38 16, 40 10Z"/>
    <!-- Head shape - broader, rounder than bull -->
    <path d="M30 22 C22 26, 16 34, 14 42 C12 50, 14 56, 18 60
             C20 62, 20 66, 18 70 C16 74, 12 78, 12 82
             C12 86, 16 90, 22 92 C28 92, 34 88, 38 84
             L42 78 C48 82, 56 82, 62 78
             L66 84 C70 88, 76 92, 82 92
             C88 90, 92 86, 92 82 C92 78, 88 74, 86 70
             C84 66, 84 62, 86 60
             C90 56, 94 48, 94 40 C94 32, 90 24, 84 20
             C78 16, 70 14, 62 14 C52 14, 40 16, 30 22Z"/>
    <!-- Snout/muzzle - broader -->
    <path d="M18 60 C14 62, 8 68, 6 74 C4 80, 8 86, 14 88
             C18 88, 22 86, 24 82 C26 78, 24 72, 22 68 C20 64, 18 62, 18 60Z"/>
    <!-- Eye -->
    <circle cx="44" cy="38" r="4.5" fill="currentColor"/>
    <circle cx="44" cy="38" r="1.8" fill="#080e1e"/>
    <!-- Nostril -->
    <ellipse cx="12" cy="76" rx="2.5" ry="3"/>
    <!-- Mouth line -->
    <path d="M14 84 C18 86, 22 86, 26 84" stroke="#080e1e" stroke-width="1.2" fill="none"/>
    <!-- Neck/shoulder - thick, powerful -->
    <path d="M84 56 C92 64, 98 76, 102 90 C106 104, 106 114, 104 118
             L50 118 C48 108, 44 96, 42 88 C40 82, 40 78, 42 74
             C50 82, 64 84, 76 78 C82 74, 86 68, 86 60Z"/>
    <!-- Fur/mane detail lines -->
    <path d="M70 20 C74 28, 78 38, 80 48" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.3"/>
    <path d="M88 64 C92 74, 96 88, 98 102" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.25"/>
    <path d="M80 70 C84 80, 88 94, 90 108" stroke="currentColor" stroke-width="1" fill="none" opacity="0.2"/>
    <!-- Brow detail -->
    <path d="M34 32 C38 28, 48 28, 54 30" stroke="#080e1e" stroke-width="1.5" fill="none"/>
    <!-- Inner ear -->
    <path d="M78 12 C82 8, 88 8, 90 12 C90 16, 86 18, 82 18" fill="currentColor" opacity="0.3"/>
    <path d="M38 10 C34 6, 28 6, 26 10 C26 14, 30 16, 34 16" fill="currentColor" opacity="0.3"/>
  </g>
</svg>
